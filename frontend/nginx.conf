# nginx.conf — single file (replaces /etc/nginx/nginx.conf)
# Non-root, port 8080, SPA fallback, gzip, cache-control
#
# Phase 6 — see .planning/phases/06-react-chatbot-frontend/06-04-PLAN.md
# Pitfalls handled: #5 (PID file), #6 (location order), #9 (base /)

# user directive intentionally commented out — Dockerfile uses USER nginx
# user  nginx;

worker_processes  auto;
pid               /tmp/nginx.pid;

error_log  /var/log/nginx/error.log warn;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Cloud Run injects a trace header; log just enough to debug 4xx/5xx
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent"';
    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;
    server_tokens   off;

    # gzip — D-07: brotli off (not in base alpine image)
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_comp_level   6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Temporary path fixes for non-root (Pitfall #5)
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path       /tmp/proxy_temp;
    fastcgi_temp_path     /tmp/fastcgi_temp;
    uwsgi_temp_path       /tmp/uwsgi_temp;
    scgi_temp_path        /tmp/scgi_temp;

    server {
        listen       8080 default_server;
        listen       [::]:8080 default_server;
        server_name  _;

        root   /usr/share/nginx/html;
        index  index.html;

        # Vite-hashed assets — immutable, 1 year cache
        # MUST come before the SPA `/` catch-all (Pitfall #6 — nginx matches
        # location blocks with longest prefix wins)
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
            access_log off;
            try_files $uri =404;
        }

        # index.html must always be revalidated so new deploys land instantly
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            expires 0;
        }

        # Healthcheck
        location = /healthz {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "ok\n";
        }

        # SPA fallback — any unknown path serves index.html so React Router
        # can handle it client-side. Must NOT match /assets/* (handled above).
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
